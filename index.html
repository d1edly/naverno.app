<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVERNO Hub & Анкета</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. ОСНОВНЫЕ НАСТРОЙКИ СТИЛЕЙ И ТИПОГРАФИКА
           ========================================================================== */
        @font-face {
            font-family: 'MarkerFat';
            src: url('Marker Fat.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #050505;
            --surface-color: rgba(20, 20, 25, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==========================================================================
           2. ЗАДНИЙ ФОН И АНИМАЦИИ
           ========================================================================== */
        .ambient-light {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(40,40,45,0.4) 0%, rgba(5,5,5,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Динамика: Плавное парение контейнера */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* Динамика: Спиннер загрузки */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        /* Динамика: Пульсация главной кнопки */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* ==========================================================================
           3. КОНТЕЙНЕРЫ И КАРТОЧКИ
           ========================================================================== */
        .header {
            font-family: 'MarkerFat', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 2;
        }

        .container {
            width: 90%;
            max-width: 480px;
            padding: 40px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            transition: var(--transition);
            box-sizing: border-box;
            position: relative;
            animation: float 6s ease-in-out infinite; /* Применяем парение */
        }

        /* Отключаем парение во время смены экранов, чтобы не дергалось */
        .container.fade-in, .container.fade-out {
            animation: none; 
        }

        .hidden { display: none !important; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: 300;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            line-height: 1;
            z-index: 10;
        }

        .close-btn:hover {
            color: var(--text-main);
            transform: scale(1.2) rotate(90deg); /* Динамика: вращение крестика */
        }

        /* ==========================================================================
           4. ХАБ И СОЦСЕТИ
           ========================================================================== */
        .hub-manifest {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-align: center;
            font-weight: 400;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-hover);
            transform: translateY(-3px); /* Динамика: подъем кнопок соцсетей */
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-main);
        }

        #startHubBtn {
            animation: pulse 2s infinite;
        }

        #startHubBtn:hover {
            animation: none;
        }

        /* ==========================================================================
           5. ТЕКСТ ВОПРОСОВ
           ========================================================================== */
        .text-content {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 30px;
            color: var(--text-main);
            animation: fadeIn 0.6s ease-out;
        }

        /* ==========================================================================
           6. ПОЛЯ ВВОДА ДАННЫХ
           ========================================================================== */
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            outline: none;
            transition: var(--transition);
            resize: none;
            -webkit-user-select: text;
            user-select: text;
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: #555555;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
            transform: translateY(-2px); /* Динамика: поле ввода приподнимается */
        }

        .words-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }
        
        .words-column input {
            margin-bottom: 0;
        }

        /* ==========================================================================
           7. ИНТЕРАКТИВНЫЙ РЕГУЛЯТОР (СЛАЙДЕР)
           ========================================================================== */
        .slider-value {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 20px;
            color: var(--text-main);
            transition: transform 0.2s ease;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: var(--border-color);
            height: 4px;
            border-radius: 2px;
            outline: none;
            margin-bottom: 30px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: var(--transition); 
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 15px rgba(255,255,255,0.5); /* Динамика: свечение ползунка */
        }

        /* ==========================================================================
           8. СЕТКА ДЛЯ ВЫБОРА ДНЕЙ И ДА/НЕТ
           ========================================================================== */
        .days-grid, .choice-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 30px;
        }

        .days-grid { grid-template-columns: repeat(4, 1fr); }
        .choice-grid { grid-template-columns: 1fr 1fr; }

        .day-btn, .choice-btn {
            padding: 14px 0;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .day-btn:hover, .choice-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            transform: translateY(-2px);
        }
        
        .day-btn.active, .choice-btn.active {
            background: var(--text-main);
            color: #000000;
            border-color: var(--text-main);
            font-weight: 700;
            transform: scale(1.05); /* Динамика: увеличение выбранной кнопки */
        }

        /* ==========================================================================
           9. ЧАСЫ (TIME PICKER)
           ========================================================================== */
        .time-picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 30px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
            min-width: 120px;
        }

        .time-block-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .time-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .time-num-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .time-arrow {
            background: none;
            border: none;
            color: #555;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-arrow:hover { 
            color: var(--text-main); 
            transform: scale(1.2);
        }

        .time-val {
            font-size: 1.75rem;
            font-weight: 700;
            width: 40px;
            text-align: center;
            line-height: 1;
        }

        .time-separator {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: -2px;
        }

        /* ==========================================================================
           10. КНОПКИ УПРАВЛЕНИЯ
           ========================================================================== */
        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 2;
            background: var(--accent);
            color: #000000;
            border: none;
            padding: 16px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .btn-back {
            flex: 1;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-hover);
        }

        /* ==========================================================================
           11. ЭКРАН УСПЕХА
           ========================================================================== */
        .locked-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .lock-icon-svg {
            color: var(--text-main);
            margin-bottom: 24px;
            opacity: 0.8;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .locked-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .locked-subtitle {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
            font-weight: 400;
        }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .fade-out { animation: fadeOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="header">NAVERNO</div>

    <div class="container fade-in" id="hub-container">
        
        <div class="social-grid">
            <a href="https://www.tiktok.com/@naverno.studio?_r=1&_t=ZP-97Ejx9geajf" class="social-btn tiktok" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.01.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 2.22-1.15 4.39-2.91 5.76-1.74 1.35-4.14 1.83-6.28 1.25-2.19-.6-4.04-2.22-4.81-4.36-.78-2.14-.4-4.66 1.01-6.43 1.36-1.72 3.59-2.61 5.72-2.39V15c-1.39-.17-2.83.25-3.84 1.25-1.04 1.03-1.44 2.63-1.05 4.05.38 1.41 1.62 2.5 3.06 2.81 1.42.3 3.01-.06 4.07-1.05 1.04-.98 1.63-2.45 1.62-3.89-.04-6.04-.02-12.08-.02-18.15z"/>
                </svg>
                TikTok
            </a>
            <a href="https://www.youtube.com/@NAVERNO3" class="social-btn youtube" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                YouTube
            </a>
        </div>

        <div class="hub-manifest">
            Если у тебя есть желание стать частью нашей студии — заполняй анкету. Кто знает, может, именно ты — тот самый недостающий пазл в нашей команде?
        </div>
        
        <button class="btn" style="width: 100%;" id="startHubBtn">Заполнить анкету</button>
    </div>

    <div class="container hidden" id="survey-container"></div>

    <script>
        try { vkBridge.send('VKWebAppInit'); } catch(e) { console.log('VK Bridge init error', e); }

        const questions = [
            { id: "q1", text: "Как тебе наш контент по десятибалльной системе?", type: "slider", min: 1, max: 10, default: 10 },
            { id: "q2", text: "С какого видео ты с нами познакомился и продолжил следить?", type: "text", placeholder: "Твой ответ..." },
            { id: "q3", text: "Почему вообще захотел стать частью нашей студии?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q4", text: "Спасибо! А теперь к вопросам касаемо твоей кандидатуры.<br><br>С какого года играешь на провинции?", type: "slider", min: 2016, max: 2026, default: 2020 },
            { id: "q5", text: "Какой уровень у тебя?", type: "slider", min: 1, max: 100, default: 10 },
            { id: "q6", text: "Как ты можешь охарактеризовать себя тремя словами?", type: "words" },
            { id: "q7", text: "Для съёмок понадобится взаимодействие в Discord. Не будет такого, что ты будешь перебивать?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q8", text: "Эти слова про тебя? «Могу предложить в идее что-то изменить, улучшить и при этом не постесняюсь»", type: "choice" },
            { id: "q9", text: "В какие дни ты обычно свободен?", type: "days" },
            { id: "q10", text: "Укажи комфортный для тебя диапазон времени", type: "timepicker" }
        ];

        let currentStep = 0;
        let userAnswers = {};
        let tempChoice = "";
        let selectedDays = [];

        let timeFromHour = 18;
        let timeFromMin = 0;
        let timeToHour = 22;
        let timeToMin = 0;

        const hubContainer = document.getElementById('hub-container');
        const surveyContainer = document.getElementById('survey-container');

        const isAlreadySubmitted = localStorage.getItem('naverno_anketa_submitted') === 'true';

        const closeBtnHtml = `<div class="close-btn" id="closeSurveyBtn">&times;</div>`;

        function renderLockedScreen() {
            surveyContainer.innerHTML = `
                ${closeBtnHtml}
                <div class="locked-container fade-in">
                    <svg class="lock-icon-svg" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <div class="locked-title">Анкета отправлена</div>
                    <div class="locked-subtitle">
                        Твои ответы уже улетели к нам. <br>
                        Мы изучим их и свяжемся в ЛС.<br><br>
                    </div>
                </div>
            `;
            surveyContainer.style.background = "rgba(20, 20, 25, 0.8)";
        }

        document.getElementById('startHubBtn').addEventListener('click', () => {
            hubContainer.classList.remove('fade-in');
            hubContainer.classList.add('fade-out');

            setTimeout(() => {
                hubContainer.classList.add('hidden');
                surveyContainer.classList.remove('hidden');
                renderStep();
            }, 300);
        });

        function renderStep() {
            if (isAlreadySubmitted) {
                renderLockedScreen();
                // Фикс невидимости, если пользователь обновил страницу
                surveyContainer.classList.remove('fade-out');
                surveyContainer.classList.add('fade-in');
                return;
            }

            surveyContainer.classList.remove('fade-in');
            surveyContainer.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                if (currentStep < questions.length) {
                    const q = questions[currentStep];
                    let inputHtml = '';
                    let isNextDisabled = true;
                    const savedVal = userAnswers[q.id] || "";

                    if (q.type === 'text') {
                        inputHtml = `<input type="text" id="answerInput" class="custom-input" placeholder="${q.placeholder}" value="${savedVal}">`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'textarea') {
                        inputHtml = `<textarea id="answerInput" class="custom-input" rows="4" placeholder="${q.placeholder}">${savedVal}</textarea>`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'slider') {
                        const currentVal = savedVal || q.default;
                        inputHtml = `
                            <div class="slider-value" id="sliderVal">${currentVal}</div>
                            <input type="range" id="answerInput" class="custom-slider" min="${q.min}" max="${q.max}" value="${currentVal}">
                        `;
                        isNextDisabled = false; 
                    } else if (q.type === 'words') {
                        const words = savedVal ? savedVal.split(", ") : ["", "", ""];
                        inputHtml = `
                            <div class="words-column">
                                <input type="text" id="w1" class="word-input" placeholder="Слово 1" value="${words[0] || ''}">
                                <input type="text" id="w2" class="word-input" placeholder="Слово 2" value="${words[1] || ''}">
                                <input type="text" id="w3" class="word-input" placeholder="Слово 3" value="${words[2] || ''}">
                            </div>
                        `;
                        isNextDisabled = !(words[0] && words[1] && words[2]);
                    } else if (q.type === 'choice') {
                        tempChoice = savedVal;
                        inputHtml = `
                            <div class="choice-grid">
                                <button class="choice-btn ${tempChoice === 'Да' ? 'active' : ''}" data-val="Да">Да</button>
                                <button class="choice-btn ${tempChoice === 'Нет' ? 'active' : ''}" data-val="Нет">Нет</button>
                            </div>
                        `;
                        isNextDisabled = !tempChoice;
                    } else if (q.type === 'days') {
                        selectedDays = savedVal ? savedVal.split(", ") : [];
                        const daysList = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс", "Каждый день"];
                        let daysButtons = daysList.map(day => {
                            const activeClass = selectedDays.includes(day) ? 'active' : '';
                            return `<button class="day-btn ${activeClass}" data-day="${day}">${day}</button>`;
                        }).join('');

                        inputHtml = `<div class="days-grid">${daysButtons}</div>`;
                        isNextDisabled = selectedDays.length === 0;
                    } else if (q.type === 'timepicker') {
                        if (savedVal) {
                            const parse = savedVal.match(/с (\d+):(\d+) до (\d+):(\d+)/);
                            if (parse) {
                                timeFromHour = parseInt(parse[1]);
                                timeFromMin = parseInt(parse[2]);
                                timeToHour = parseInt(parse[3]);
                                timeToMin = parseInt(parse[4]);
                            }
                        }
                        const fH = String(timeFromHour).padStart(2, '0');
                        const fM = String(timeFromMin).padStart(2, '0');
                        const tH = String(timeToHour).padStart(2, '0');
                        const tM = String(timeToMin).padStart(2, '0');

                        inputHtml = `
                            <div class="time-picker-container">
                                <div class="time-block">
                                    <div class="time-block-label">С</div>
                                    <div class="time-display">
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="fromHour">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
                                            </button>
                                            <span class="time-val" id="fromHour">${fH}</span>
                                            <button class="time-arrow" data-action="down" data-target="fromHour">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                                            </button>
                                        </div>
                                        <span class="time-separator">:</span>
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="fromMin">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
                                            </button>
                                            <span class="time-val" id="fromMin">${fM}</span>
                                            <button class="time-arrow" data-action="down" data-target="fromMin">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6-6"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-block">
                                    <div class="time-block-label">ДО</div>
                                    <div class="time-display">
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="toHour">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
                                            </button>
                                            <span class="time-val" id="toHour">${tH}</span>
                                            <button class="time-arrow" data-action="down" data-target="toHour">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                                            </button>
                                        </div>
                                        <span class="time-separator">:</span>
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="toMin">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
                                            </button>
                                            <span class="time-val" id="toMin">${tM}</span>
                                            <button class="time-arrow" data-action="down" data-target="toMin">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        isNextDisabled = false;
                    }

                    const btnText = (currentStep === questions.length - 1) ? "Отправить" : "Далее";

                    html = `
                        ${closeBtnHtml}
                        <div class="text-content">${q.text}</div>
                        ${inputHtml}
                        <div class="nav-buttons">
                            ${currentStep > 0 ? `<button class="btn btn-back" id="backBtn">Назад</button>` : ''}
                            <button class="btn" id="nextBtn" ${isNextDisabled ? 'disabled' : ''}>${btnText}</button>
                        </div>
                    `;
                } else {
                    // ЭКРАН ЗАГРУЗКИ ПЕРЕД ФИНАЛОМ
                    html = `
                        ${closeBtnHtml}
                        <div class="text-content" style="margin-bottom: 0; text-align: center;">
                            Обрабатываем ответы...
                        </div>
                        <div class="loader"></div>
                        <div class="text-content" style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted); text-align: center;">
                            Пожалуйста, подождите
                        </div>
                    `;
                    
                    localStorage.setItem('naverno_anketa_submitted', 'true');

                    const scriptUrl = 'https://script.google.com/macros/s/AKfycbx1aIzpzCVAJLAQN2h3N2ijLYrnK7Os2-736w-r-kjlM6lxrtqKccQ8hVxVuP2l-FQ/exec';

                    function sendData(finalData) {
                        fetch(scriptUrl, { 
                            method: 'POST', 
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                            body: JSON.stringify(finalData)
                        })
                        .then(() => console.log("Данные успешно отправлены в Google Script!"))
                        .catch(err => console.error("Ошибка при отправке в Google Script:", err));
                    }

                    vkBridge.send('VKWebAppGetUserInfo')
                        .then(user => {
                            const finalData = {
                                ...userAnswers,
                                userName: user.first_name + " " + user.last_name,
                                userId: user.id
                            };
                            sendData(finalData);
                        })
                        .catch(err => {
                            const finalData = { ...userAnswers, userName: "Аноним", userId: 0 };
                            sendData(finalData);
                        });

                    // ИСПРАВЛЕНИЕ БАГА С ИСЧЕЗНОВЕНИЕМ
                    setTimeout(() => {
                        surveyContainer.classList.remove('fade-in');
                        surveyContainer.classList.add('fade-out');
                        
                        setTimeout(() => {
                            renderLockedScreen();
                            // Явно возвращаем прозрачность контейнеру!
                            surveyContainer.classList.remove('fade-out');
                            surveyContainer.classList.add('fade-in');
                        }, 300); // время на затухание спиннера
                        
                    }, 2500); // Сократил ожидание до 2.5 секунд для лучшего UX
                }

                surveyContainer.innerHTML = html;
                surveyContainer.classList.remove('fade-out');
                surveyContainer.classList.add('fade-in');

            }, 300);
        }

        document.addEventListener('click', function(e) {

            if (e.target && e.target.id === 'closeSurveyBtn') {
                surveyContainer.classList.remove('fade-in');
                surveyContainer.classList.add('fade-out');
                
                setTimeout(() => {
                    surveyContainer.classList.add('hidden');
                    hubContainer.classList.remove('hidden', 'fade-out');
                    hubContainer.classList.add('fade-in');
                }, 300);
                return;
            }

            if (e.target && e.target.id === 'backBtn') {
                currentStep--;
                renderStep();
                return;
            }

            if (e.target && e.target.classList.contains('choice-btn')) {
                const btns = document.querySelectorAll('.choice-btn');
                btns.forEach(btn => btn.classList.remove('active'));
                
                e.target.classList.add('active');
                tempChoice = e.target.getAttribute('data-val');
                
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.disabled = false;
                return;
            }

            if (e.target && e.target.classList.contains('day-btn')) {
                const day = e.target.getAttribute('data-day');
                
                if (day === "Каждый день") {
                    if (selectedDays.includes("Каждый день")) selectedDays = [];
                    else selectedDays = ["Каждый день"];
                } else {
                    selectedDays = selectedDays.filter(d => d !== "Каждый день");
                    if (selectedDays.includes(day)) selectedDays = selectedDays.filter(d => d !== day);
                    else selectedDays.push(day);
                }

                const btns = document.querySelectorAll('.day-btn');
                btns.forEach(btn => {
                    const bDay = btn.getAttribute('data-day');
                    if (selectedDays.includes(bDay)) btn.classList.add('active');
                    else btn.classList.remove('active');
                });

                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.disabled = selectedDays.length === 0;
                return;
            }

            if (e.target && e.target.closest('.time-arrow')) {
                const btn = e.target.closest('.time-arrow');
                const action = btn.getAttribute('data-action');
                const target = btn.getAttribute('data-target');

                if (target === 'fromHour') {
                    timeFromHour = (action === 'up') ? (timeFromHour + 1) % 24 : (timeFromHour - 1 + 24) % 24;
                    document.getElementById('fromHour').innerText = String(timeFromHour).padStart(2, '0');
                } else if (target === 'toHour') {
                    timeToHour = (action === 'up') ? (timeToHour + 1) % 24 : (timeToHour - 1 + 24) % 24;
                    document.getElementById('toHour').innerText = String(timeToHour).padStart(2, '0');
                } else if (target === 'fromMin') {
                    timeFromMin = (action === 'up') ? (timeFromMin + 5) % 60 : (timeFromMin - 5 + 60) % 60;
                    document.getElementById('fromMin').innerText = String(timeFromMin).padStart(2, '0');
                } else if (target === 'toMin') {
                    timeToMin = (action === 'up') ? (timeToMin + 5) % 60 : (timeToMin - 5 + 60) % 60;
                    document.getElementById('toMin').innerText = String(timeToMin).padStart(2, '0');
                }
                return;
            }

            if (e.target && e.target.id === 'nextBtn') {
                const q = questions[currentStep];
                
                if (q.type === 'slider' || q.type === 'text' || q.type === 'textarea') {
                    userAnswers[q.id] = document.getElementById('answerInput').value.trim();
                } else if (q.type === 'words') {
                    const w1 = document.getElementById('w1').value.trim();
                    const w2 = document.getElementById('w2').value.trim();
                    const w3 = document.getElementById('w3').value.trim();
                    userAnswers[q.id] = `${w1}, ${w2}, ${w3}`;
                } else if (q.type === 'choice') {
                    userAnswers[q.id] = tempChoice;
                } else if (q.type === 'days') {
                    userAnswers[q.id] = selectedDays.join(', ');
                } else if (q.type === 'timepicker') {
                    const fH = String(timeFromHour).padStart(2, '0');
                    const fM = String(timeFromMin).padStart(2, '0');
                    const tH = String(timeToHour).padStart(2, '0');
                    const tM = String(timeToMin).padStart(2, '0');
                    userAnswers[q.id] = `с ${fH}:${fM} до ${tH}:${tM}`;
                }
                
                currentStep++;
                renderStep();
                return;
            }
        });

        document.addEventListener('input', function(e) {
            if (!questions[currentStep]) return;
            const q = questions[currentStep];
            const nextBtn = document.getElementById('nextBtn');

            if (!nextBtn) return;

            if (e.target && e.target.classList.contains('custom-input')) {
                nextBtn.disabled = e.target.value.trim().length === 0;
            }

            if (e.target && e.target.classList.contains('custom-slider')) {
                const valDisplay = document.getElementById('sliderVal');
                if (valDisplay) {
                    valDisplay.innerText = e.target.value;
                    valDisplay.style.transform = 'scale(1.15)';
                    setTimeout(() => { valDisplay.style.transform = 'scale(1)'; }, 150);
                }
            }

            if (e.target && e.target.classList.contains('word-input')) {
                const w1 = document.getElementById('w1');
                const w2 = document.getElementById('w2');
                const w3 = document.getElementById('w3');

                if (w1 && w2 && w3) {
                    if (w1.value.includes(' ')) w1.value = w1.value.replace(/\s/g, '');
                    if (w2.value.includes(' ')) w2.value = w2.value.replace(/\s/g, '');
                    if (w3.value.includes(' ')) w3.value = w3.value.replace(/\s/g, '');
                    nextBtn.disabled = !(w1.value.trim() && w2.value.trim() && w3.value.trim());
                }
            }
        });

    </script>
</body>
</html>
