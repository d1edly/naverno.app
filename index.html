<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVERNO Hub & Анкета</title>
    
    <!-- Подключение официального SDK VK Bridge для мини-приложений ВКонтакте -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <style>
        /* ==========================================================================
           1. ШРИФТЫ И ОСНОВНЫЕ НАСТРОЙКИ СТИЛЕЙ
           ========================================================================== */
        @font-face {
            font-family: 'MarkerFat';
            src: url('Marker Fat.otf') format('opentype');
            font-display: swap;
        }
        
        @font-face {
            font-family: 'Lemon';
            src: url('ofont.ru_Lemon.ttf') format('truetype');
            font-display: swap;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==========================================================================
           2. ЗАДНИЙ ФОН И ДИНАМИЧЕСКИЕ БЛОБЫ
           ========================================================================== */
        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.5;
            animation: float 18s infinite ease-in-out alternate;
            pointer-events: none;
        }
        
        .blob-1 {
            width: 350px;
            height: 350px;
            background: #2a2a2a;
            top: 5%;
            left: 5%;
        }
        
        .blob-2 {
            width: 450px;
            height: 450px;
            background: #151515;
            bottom: 5%;
            right: 5%;
            animation-delay: -7s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(40px, 60px) scale(1.15) rotate(10deg); }
            100% { transform: translate(-40px, -30px) scale(0.9) rotate(-10deg); }
        }

        /* ==========================================================================
           3. ОБЩИЕ ЭЛЕМЕНТЫ КОНТЕЙНЕРА
           ========================================================================== */
        .header {
            font-family: 'MarkerFat', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 2;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 30px;
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            position: relative;
        }

        .container:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        /* Крестик для возврата в Хаб */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-family: Arial, sans-serif;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
            z-index: 10;
        }

        .close-btn:hover {
            color: #ffffff;
            transform: scale(1.2);
        }

        /* ==========================================================================
           4. СТИЛИ ХАБА
           ========================================================================== */
        .hub-manifest {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #d0d0d0;
            margin-bottom: 35px;
            text-align: center;
            padding: 0 10px;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .social-btn svg {
            width: 36px;
            height: 36px;
            margin-bottom: 10px;
            fill: #ffffff;
            transition: fill 0.3s ease;
        }
        
        .social-btn.tiktok:hover svg { fill: #ff0050; filter: drop-shadow(2px 2px 0px #00f2fe); }
        .social-btn.youtube:hover svg { fill: #ff0000; }

        .social-btn span {
            font-family: 'Lemon', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           5. АНИМАЦИЯ ТЕКСТА
           ========================================================================== */
        .word-reveal {
            opacity: 0;
            display: inline-block;
            animation: fadeInWord 0.6s forwards ease-out;
            vertical-align: bottom;
        }
        
        @keyframes fadeInWord {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .text-content {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        /* ==========================================================================
           6. ПОЛЯ ВВОДА ДАННЫХ
           ========================================================================== */
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 1rem;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s ease, background 0.3s ease;
            resize: none;
            -webkit-user-select: text;
            user-select: text;
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #ffffff;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .words-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
        }
        
        .words-column input {
            margin-bottom: 0;
            text-align: center;
        }

        /* ==========================================================================
           8. ИНТЕРАКТИВНЫЙ РЕГУЛЯТОР
           ========================================================================== */
        .slider-value {
            font-size: 2.8rem;
            font-family: 'MarkerFat', sans-serif;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s ease;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            height: 8px;
            border-radius: 10px;
            outline: none;
            margin-bottom: 30px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s ease, background-color 0.2s ease; 
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* ==========================================================================
           9. СЕТКА ДЛЯ ВЫБОРА ДНЕЙ
           ========================================================================== */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .day-btn {
            padding: 14px 5px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .day-btn:hover { background: rgba(255, 255, 255, 0.08); }
        
        .day-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* ==========================================================================
           10. ЧАСЫ
           ========================================================================== */
        .time-picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 18px;
            min-width: 110px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .time-block-label {
            font-size: 0.85rem;
            color: #888888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .time-num-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-arrow {
            background: none;
            border: none;
            color: #666666;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 2px 10px;
            transition: color 0.2s, transform 0.1s;
        }

        .time-arrow:hover {
            color: #ffffff;
            transform: scale(1.3);
        }

        .time-val {
            font-family: 'MarkerFat', sans-serif;
            font-size: 2rem;
            width: 45px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .time-separator {
            font-family: 'MarkerFat', sans-serif;
            font-size: 2rem;
            color: #ffffff;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ==========================================================================
           11. СЕТКА КНОПОК ДА/НЕТ
           ========================================================================== */
        .choice-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .choice-btn {
            flex: 1;
            padding: 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .choice-btn:hover { background: rgba(255, 255, 255, 0.08); }
        
        .choice-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }

        /* ==========================================================================
           12. КНОПКИ УПРАВЛЕНИЯ
           ========================================================================== */
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            flex: 2;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px 20px;
            font-family: 'Lemon', sans-serif;
            font-size: 1.1rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .btn:hover:not(:disabled) {
            background: #e0e0e0;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-back {
            flex: 1;
            background: transparent;
            color: #aaaaaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
        
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ==========================================================================
           13. ДЕКОРАТИВНЫЙ ЭКРАН БЛОКИРОВКИ
           ========================================================================== */
        .locked-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .lock-icon-svg {
            color: #ffffff;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5));
            animation: pulse-lock 2.5s infinite ease-in-out;
            margin-bottom: 25px;
        }

        @keyframes pulse-lock {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.8)); }
        }

        .locked-title {
            font-family: 'MarkerFat', sans-serif;
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .locked-subtitle {
            font-size: 1rem;
            line-height: 1.6;
            color: #aaaaaa;
        }

        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .fade-out { animation: fadeOut 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(0.95) translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="header">NAVERNO</div>

    <!-- СЕКЦИЯ 1: ХАБ -->
    <div class="container fade-in" id="hub-container">
        
        <!-- Социальные сети теперь сверху, сразу под заголовком -->
        <div class="social-grid">
            <a href="https://www.tiktok.com/@naverno.studio?_r=1&_t=ZP-97Ejx9geajf" class="social-btn tiktok" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.01.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 2.22-1.15 4.39-2.91 5.76-1.74 1.35-4.14 1.83-6.28 1.25-2.19-.6-4.04-2.22-4.81-4.36-.78-2.14-.4-4.66 1.01-6.43 1.36-1.72 3.59-2.61 5.72-2.39V15c-1.39-.17-2.83.25-3.84 1.25-1.04 1.03-1.44 2.63-1.05 4.05.38 1.41 1.62 2.5 3.06 2.81 1.42.3 3.01-.06 4.07-1.05 1.04-.98 1.63-2.45 1.62-3.89-.04-6.04-.02-12.08-.02-18.15z"/>
                </svg>
                <span>TikTok</span>
            </a>
            <a href="https://www.youtube.com/@NAVERNO3" class="social-btn youtube" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                <span>YouTube</span>
            </a>
        </div>

        <div class="hub-manifest">
            Если у тебя есть желание стать частью нашей студии — заполняй анкету. Кто знает, может, именно ты — тот самый недостающий пазл в нашей команде?
        </div>
        
        <button class="btn" style="width: 100%;" id="startHubBtn">Заполнить анкету</button>
    </div>

    <!-- СЕКЦИЯ 2: АНКЕТА -->
    <div class="container hidden" id="survey-container"></div>

    <script>
        try { vkBridge.send('VKWebAppInit'); } catch(e) { console.log('VK Bridge init error', e); }

        const questions = [
            { id: "q1", text: "Как тебе наш контент по десяти балльной системе?", type: "slider", min: 1, max: 10, default: 10 },
            { id: "q2", text: "Хм, а с какого видео ты с нами познакомился и продолжил следить?", type: "text", placeholder: "Твой ответ..." },
            { id: "q3", text: "Ого, а почему вообще захотел стать частью нашей студии?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q4", text: "Спасибо! А теперь к вопросам касаемо твоей кандидатуры.<br><br>С какого года играешь на провинции?", type: "slider", min: 2016, max: 2026, default: 2020 },
            { id: "q5", text: "А какой лвл у тебя?", type: "slider", min: 1, max: 100, default: 10 },
            { id: "q6", text: "Как ты можешь охарактеризовать себя тремя словами?", type: "words" },
            { id: "q7", text: "Вероятно нам для съёмок понадобится взаимодействие с тобой в дискорде, не будет такого что ты будешь нас перебивать и так далее?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q8", text: "Эти слова про тебя? - могу предложить в идее что-то изменить, улучшить и при этом не постесняюсь", type: "choice" },
            { id: "q9", text: "В какие дни ты обычно свободен?", type: "days" },
            { id: "q10", text: "И по времени хотелось бы понимать, какой диапазон (с какого времени до какого)", type: "timepicker" }
        ];

        let currentStep = 0;
        let userAnswers = {};
        let tempChoice = "";
        let selectedDays = [];

        let timeFromHour = 18;
        let timeFromMin = 0;
        let timeToHour = 22;
        let timeToMin = 0;

        const hubContainer = document.getElementById('hub-container');
        const surveyContainer = document.getElementById('survey-container');

        const isAlreadySubmitted = localStorage.getItem('naverno_anketa_submitted') === 'true';

        /**
         * ИСПРАВЛЕНО: Парсинг текста с учетом HTML-тегов (<br>)
         * Предотвращает поломку интервалов и съезжание текста на новые строки.
         */
        function generateAnimatedText(text) {
            let delayCount = 0;
            return text.split('<br>').map(line => {
                return line.split(' ').map(word => {
                    if (!word) return '';
                    let delay = delayCount++ * 0.03;
                    return `<span class="word-reveal" style="animation-delay: ${delay}s">${word}</span>`;
                }).join(' '); // оставляем нормальный пробел
            }).join('<br>');
        }

        // HTML для кнопки-крестика закрытия анкеты
        const closeBtnHtml = `<div class="close-btn" id="closeSurveyBtn">&times;</div>`;

        function renderLockedScreen() {
            surveyContainer.innerHTML = `
                ${closeBtnHtml}
                <div class="locked-container fade-in">
                    <svg class="lock-icon-svg" xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <div class="locked-title">АНКЕТА ОТПРАВЛЕНА</div>
                    <div class="locked-subtitle">
                        Твои ответы уже улетели к нам. <br>
                        Мы изучим их и свяжемся в ЛС, если ты нам подойдешь.
                        <br><br>
                        Повторно заполнить форму нельзя.
                    </div>
                </div>
            `;
            surveyContainer.style.background = "rgba(10, 10, 10, 0.7)";
            surveyContainer.style.border = "1px solid rgba(255, 255, 255, 0.08)";
            surveyContainer.style.backdropFilter = "blur(25px)";
        }

        document.getElementById('startHubBtn').addEventListener('click', () => {
            hubContainer.classList.remove('fade-in');
            hubContainer.classList.add('fade-out');

            setTimeout(() => {
                hubContainer.classList.add('hidden');
                surveyContainer.classList.remove('hidden');
                renderStep();
            }, 400);
        });

        function renderStep() {
            if (isAlreadySubmitted) {
                renderLockedScreen();
                return;
            }

            surveyContainer.classList.remove('fade-in');
            surveyContainer.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                if (currentStep < questions.length) {
                    const q = questions[currentStep];
                    let inputHtml = '';
                    let isNextDisabled = true;
                    const savedVal = userAnswers[q.id] || "";

                    if (q.type === 'text') {
                        inputHtml = `<input type="text" id="answerInput" class="custom-input" placeholder="${q.placeholder}" value="${savedVal}">`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'textarea') {
                        inputHtml = `<textarea id="answerInput" class="custom-input" rows="4" placeholder="${q.placeholder}">${savedVal}</textarea>`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'slider') {
                        const currentVal = savedVal || q.default;
                        inputHtml = `
                            <div class="slider-value" id="sliderVal">${currentVal}</div>
                            <input type="range" id="answerInput" class="custom-slider" min="${q.min}" max="${q.max}" value="${currentVal}">
                        `;
                        isNextDisabled = false; 
                    } else if (q.type === 'words') {
                        const words = savedVal ? savedVal.split(", ") : ["", "", ""];
                        inputHtml = `
                            <div class="words-column">
                                <input type="text" id="w1" class="word-input" placeholder="Слово №1 (например: Добрый)" value="${words[0] || ''}">
                                <input type="text" id="w2" class="word-input" placeholder="Слово №2 (например: Отзывчивый)" value="${words[1] || ''}">
                                <input type="text" id="w3" class="word-input" placeholder="Слово №3 (например: Адекватный)" value="${words[2] || ''}">
                            </div>
                        `;
                        isNextDisabled = !(words[0] && words[1] && words[2]);
                    } else if (q.type === 'choice') {
                        tempChoice = savedVal;
                        inputHtml = `
                            <div class="choice-grid">
                                <button class="choice-btn ${tempChoice === 'Да' ? 'active' : ''}" data-val="Да">Да</button>
                                <button class="choice-btn ${tempChoice === 'Нет' ? 'active' : ''}" data-val="Нет">Нет</button>
                            </div>
                        `;
                        isNextDisabled = !tempChoice;
                    } else if (q.type === 'days') {
                        selectedDays = savedVal ? savedVal.split(", ") : [];
                        const daysList = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс", "Каждый день"];
                        let daysButtons = daysList.map(day => {
                            const activeClass = selectedDays.includes(day) ? 'active' : '';
                            return `<button class="day-btn ${activeClass}" data-day="${day}">${day}</button>`;
                        }).join('');

                        inputHtml = `<div class="days-grid">${daysButtons}</div>`;
                        isNextDisabled = selectedDays.length === 0;
                    } else if (q.type === 'timepicker') {
                        if (savedVal) {
                            const parse = savedVal.match(/с (\d+):(\d+) до (\d+):(\d+)/);
                            if (parse) {
                                timeFromHour = parseInt(parse[1]);
                                timeFromMin = parseInt(parse[2]);
                                timeToHour = parseInt(parse[3]);
                                timeToMin = parseInt(parse[4]);
                            }
                        }
                        const fH = String(timeFromHour).padStart(2, '0');
                        const fM = String(timeFromMin).padStart(2, '0');
                        const tH = String(timeToHour).padStart(2, '0');
                        const tM = String(timeToMin).padStart(2, '0');

                        inputHtml = `
                            <div class="time-picker-container">
                                <div class="time-block">
                                    <div class="time-block-label">С</div>
                                    <div class="time-display">
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="fromHour">▲</button>
                                            <span class="time-val" id="fromHour">${fH}</span>
                                            <button class="time-arrow" data-action="down" data-target="fromHour">▼</button>
                                        </div>
                                        <span class="time-separator">:</span>
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="fromMin">▲</button>
                                            <span class="time-val" id="fromMin">${fM}</span>
                                            <button class="time-arrow" data-action="down" data-target="fromMin">▼</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-block">
                                    <div class="time-block-label">ДО</div>
                                    <div class="time-display">
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="toHour">▲</button>
                                            <span class="time-val" id="toHour">${tH}</span>
                                            <button class="time-arrow" data-action="down" data-target="toHour">▼</button>
                                        </div>
                                        <span class="time-separator">:</span>
                                        <div class="time-num-group">
                                            <button class="time-arrow" data-action="up" data-target="toMin">▲</button>
                                            <span class="time-val" id="toMin">${tM}</span>
                                            <button class="time-arrow" data-action="down" data-target="toMin">▼</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        isNextDisabled = false;
                    }

                    const btnText = (currentStep === questions.length - 1) ? "Отправить" : "Далее";

                    html = `
                        ${closeBtnHtml}
                        <div class="text-content">${generateAnimatedText(q.text)}</div>
                        ${inputHtml}
                        <div class="nav-buttons">
                            ${currentStep > 0 ? `<button class="btn btn-back" id="backBtn">Назад</button>` : ''}
                            <button class="btn" id="nextBtn" ${isNextDisabled ? 'disabled' : ''}>${btnText}</button>
                        </div>
                    `;
                } else {
                    const finalText = "Всё, окей, я тебя услышал, в ближайшее время с тобой свяжутся в лс, спасибо что уделил время.";
                    html = `
                        ${closeBtnHtml}
                        <div class="text-content" style="margin-bottom: 0; text-align: center;">
                            ${generateAnimatedText(finalText)}
                        </div>
                    `;
                    
                    localStorage.setItem('naverno_anketa_submitted', 'true');

                    const scriptUrl = 'https://script.google.com/macros/s/AKfycbx1aIzpzCVAJLAQN2h3N2ijLYrnK7Os2-736w-r-kjlM6lxrtqKccQ8hVxVuP2l-FQ/exec';

                    vkBridge.send('VKWebAppGetUserInfo')
                        .then(user => {
                            const finalData = {
                                ...userAnswers,
                                userName: user.first_name + " " + user.last_name,
                                userId: user.id
                            };
                            fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(finalData) });
                        })
                        .catch(err => {
                            const finalData = { ...userAnswers, userName: "Аноним", userId: 0 };
                            fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(finalData) });
                        });

                    setTimeout(() => {
                        surveyContainer.classList.remove('fade-in');
                        surveyContainer.classList.add('fade-out');
                        setTimeout(() => {
                            renderLockedScreen();
                        }, 400);
                    }, 5000);
                }

                surveyContainer.innerHTML = html;
                surveyContainer.classList.remove('fade-out');
                surveyContainer.classList.add('fade-in');

            }, 300);
        }

        document.addEventListener('click', function(e) {

            // ОБРАБОТЧИК ДЛЯ ВОЗВРАТА В ХАБ ПРИ НАЖАТИИ КРЕСТИКА
            if (e.target && e.target.id === 'closeSurveyBtn') {
                surveyContainer.classList.remove('fade-in');
                surveyContainer.classList.add('fade-out');
                
                setTimeout(() => {
                    surveyContainer.classList.add('hidden');
                    hubContainer.classList.remove('hidden', 'fade-out');
                    hubContainer.classList.add('fade-in');
                }, 400);
                return;
            }

            if (e.target && e.target.id === 'backBtn') {
                currentStep--;
                renderStep();
                return;
            }

            if (e.target && e.target.classList.contains('choice-btn')) {
                const btns = document.querySelectorAll('.choice-btn');
                btns.forEach(btn => btn.classList.remove('active'));
                
                e.target.classList.add('active');
                tempChoice = e.target.getAttribute('data-val');
                
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.disabled = false;
                return;
            }

            if (e.target && e.target.classList.contains('day-btn')) {
                const day = e.target.getAttribute('data-day');
                
                if (day === "Каждый день") {
                    if (selectedDays.includes("Каждый день")) selectedDays = [];
                    else selectedDays = ["Каждый день"];
                } else {
                    selectedDays = selectedDays.filter(d => d !== "Каждый день");
                    if (selectedDays.includes(day)) selectedDays = selectedDays.filter(d => d !== day);
                    else selectedDays.push(day);
                }

                const btns = document.querySelectorAll('.day-btn');
                btns.forEach(btn => {
                    const bDay = btn.getAttribute('data-day');
                    if (selectedDays.includes(bDay)) btn.classList.add('active');
                    else btn.classList.remove('active');
                });

                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.disabled = selectedDays.length === 0;
                return;
            }

            if (e.target && e.target.classList.contains('time-arrow')) {
                const action = e.target.getAttribute('data-action');
                const target = e.target.getAttribute('data-target');

                if (target === 'fromHour') {
                    timeFromHour = (action === 'up') ? (timeFromHour + 1) % 24 : (timeFromHour - 1 + 24) % 24;
                    document.getElementById('fromHour').innerText = String(timeFromHour).padStart(2, '0');
                } else if (target === 'toHour') {
                    timeToHour = (action === 'up') ? (timeToHour + 1) % 24 : (timeToHour - 1 + 24) % 24;
                    document.getElementById('toHour').innerText = String(timeToHour).padStart(2, '0');
                } else if (target === 'fromMin') {
                    timeFromMin = (action === 'up') ? (timeFromMin + 5) % 60 : (timeFromMin - 5 + 60) % 60;
                    document.getElementById('fromMin').innerText = String(timeFromMin).padStart(2, '0');
                } else if (target === 'toMin') {
                    timeToMin = (action === 'up') ? (timeToMin + 5) % 60 : (timeToMin - 5 + 60) % 60;
                    document.getElementById('toMin').innerText = String(timeToMin).padStart(2, '0');
                }
                return;
            }

            if (e.target && e.target.id === 'nextBtn') {
                const q = questions[currentStep];
                
                if (q.type === 'slider' || q.type === 'text' || q.type === 'textarea') {
                    userAnswers[q.id] = document.getElementById('answerInput').value.trim();
                } else if (q.type === 'words') {
                    const w1 = document.getElementById('w1').value.trim();
                    const w2 = document.getElementById('w2').value.trim();
                    const w3 = document.getElementById('w3').value.trim();
                    userAnswers[q.id] = `${w1}, ${w2}, ${w3}`;
                } else if (q.type === 'choice') {
                    userAnswers[q.id] = tempChoice;
                } else if (q.type === 'days') {
                    userAnswers[q.id] = selectedDays.join(', ');
                } else if (q.type === 'timepicker') {
                    const fH = String(timeFromHour).padStart(2, '0');
                    const fM = String(timeFromMin).padStart(2, '0');
                    const tH = String(timeToHour).padStart(2, '0');
                    const tM = String(timeToMin).padStart(2, '0');
                    userAnswers[q.id] = `с ${fH}:${fM} до ${tH}:${tM}`;
                }
                
                currentStep++;
                renderStep();
                return;
            }
        });

        document.addEventListener('input', function(e) {
            if (!questions[currentStep]) return;
            const q = questions[currentStep];
            const nextBtn = document.getElementById('nextBtn');

            if (!nextBtn) return;

            if (e.target && e.target.classList.contains('custom-input')) {
                nextBtn.disabled = e.target.value.trim().length === 0;
            }

            if (e.target && e.target.classList.contains('custom-slider')) {
                const valDisplay = document.getElementById('sliderVal');
                if (valDisplay) {
                    valDisplay.innerText = e.target.value;
                    valDisplay.style.transform = 'scale(1.2)';
                    setTimeout(() => { valDisplay.style.transform = 'scale(1)'; }, 150);
                }
            }

            if (e.target && e.target.classList.contains('word-input')) {
                const w1 = document.getElementById('w1');
                const w2 = document.getElementById('w2');
                const w3 = document.getElementById('w3');

                if (w1 && w2 && w3) {
                    if (w1.value.includes(' ')) w1.value = w1.value.replace(/\s/g, '');
                    if (w2.value.includes(' ')) w2.value = w2.value.replace(/\s/g, '');
                    if (w3.value.includes(' ')) w3.value = w3.value.replace(/\s/g, '');
                    nextBtn.disabled = !(w1.value.trim() && w2.value.trim() && w3.value.trim());
                }
            }
        });

    </script>
</body>
</html>
