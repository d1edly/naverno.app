<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Анкета NAVERNO</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        /* Шрифты */
        @font-face {
            font-family: 'MarkerFat';
            src: url('Marker Fat.otf') format('opentype');
        }
        @font-face {
            font-family: 'Lemon';
            src: url('ofont.ru_Lemon.ttf') format('truetype');
        }

        /* Анимированный фон с плавающими элементами */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            overflow: hidden; /* Скрываем скролл от фона */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Атмосферные пятна на фоне */
        .blob {
            position: absolute;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.6;
            animation: float 15s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 300px;
            height: 300px;
            background: #2a2a2a;
            top: 10%;
            left: 10%;
        }
        .blob-2 {
            width: 400px;
            height: 400px;
            background: #151515;
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-30px, -20px) scale(0.9); }
        }

        /* Заголовок NAVERNO */
        .header {
            font-family: 'MarkerFat', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 2;
        }

        /* Стеклянная плашка (Glassmorphism) */
        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 30px;
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            transition: all 0.4s ease;
        }

        .container:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 255, 255, 0.03);
            transform: translateY(-2px);
        }

        /* Плавное появление слов (стартовый текст) */
        .word-reveal {
            opacity: 0;
            display: inline-block;
            animation: fadeInWord 0.6s forwards ease-out;
        }
        
        @keyframes fadeInWord {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .text-content {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        /* Поля ввода */
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 1rem;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s ease, background 0.3s ease;
            resize: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #ffffff;
            background: rgba(20, 20, 20, 0.8);
        }

        /* Три слова */
        .words-grid {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .words-grid input {
            margin-bottom: 0;
            text-align: center;
        }

        /* Ползунки */
        .slider-value {
            font-size: 2.2rem;
            font-family: 'MarkerFat', sans-serif;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 5px;
            outline: none;
            margin-bottom: 30px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transition: transform 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Кнопки Да/Нет */
        .choice-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .choice-btn {
            flex: 1;
            padding: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .choice-btn:hover { background: rgba(255, 255, 255, 0.05); }
        .choice-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Основные кнопки (Далее, Назад) */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            flex: 2;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 20px;
            font-family: 'Lemon', sans-serif;
            font-size: 1rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover:not(:disabled) {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-back {
            flex: 1;
            background: transparent;
            color: #aaaaaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Анимация переходов карточек */
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.97); }
        }
    </style>
</head>
<body>

    <!-- Атмосферный фон -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="header">NAVERNO</div>

    <div class="container" id="main-container">
        <!-- Контент подгружается скриптом -->
    </div>

    <script>
        try { vkBridge.send('VKWebAppInit'); } catch(e) { console.log('VK Bridge init error', e); }

        const questions = [
            { id: "q1", text: "Как тебе наш контент по десяти балльной системе?", type: "slider", min: 1, max: 10, default: 10 },
            { id: "q2", text: "Хм, а с какого видео ты с нами познакомился и продолжил следить?", type: "text", placeholder: "Твой ответ..." },
            { id: "q3", text: "Ого, а почему вообще захотел стать частью нашей студии?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q4", text: "Спасибо! А теперь к вопросам касаемо твоей кандидатуры.<br><br>С какого года играешь на провинции?", type: "slider", min: 2016, max: 2026, default: 2020 },
            { id: "q5", text: "А какой лвл у тебя?", type: "slider", min: 1, max: 100, default: 10 },
            { id: "q6", text: "Как ты можешь охарактеризовать себя тремя словами?", type: "words" },
            { id: "q7", text: "Вероятно нам для съёмок понадобится взаимодействие с тобой в дискорде, не будет такого что ты будешь нас перебивать и так далее?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q8", text: "Эти слова про тебя? - могу предложить в идее что-то изменить, улучшить и при этом не постесняюсь", type: "choice" },
            { id: "q9", text: "В какие дни ты обычно свободен?", type: "text", placeholder: "Например: Пн, Ср, Пт" },
            { id: "q10", text: "И по времени хотелось бы понимать, какой диапазон (с какого времени до какого)", type: "text", placeholder: "Например: с 18:00 до 22:00" }
        ];

        let currentStep = -1;
        let userAnswers = {};
        let tempChoice = ""; 

        const container = document.getElementById('main-container');

        // Функция разбивает текст на слова для плавной анимации
        function generateAnimatedText(text) {
            return text.split(' ').map((word, index) => {
                let delay = index * 0.05; // Задержка для каждого слова
                return `<span class="word-reveal" style="animation-delay: ${delay}s">${word}</span>`;
            }).join(' ');
        }

        function renderStep() {
            container.classList.remove('fade-in');
            container.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                if (currentStep === -1) {
                    // Стартовый экран
                    const rawText = "Здарова! Мы тут решили набрать какое-то количество людей в актёрский состав, чтобы у нас было больше свободы фантазии, если ты хочешь двигаться с нами, то нам нужно о тебе немного узнать, для этого тебе нужно заполнить анкету.";
                    const animatedHtml = generateAnimatedText(rawText);

                    html = `
                        <div class="text-content" style="min-height: 120px;">
                            ${animatedHtml}
                        </div>
                        <button class="btn" style="width: 100%;" id="startBtn">Заполнить анкету</button>
                    `;
                } else if (currentStep < questions.length) {
                    // Вопросы
                    const q = questions[currentStep];
                    let inputHtml = '';
                    let isNextDisabled = true;
                    const savedVal = userAnswers[q.id] || "";

                    if (q.type === 'text') {
                        inputHtml = `<input type="text" id="answerInput" placeholder="${q.placeholder}" value="${savedVal}">`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'textarea') {
                        inputHtml = `<textarea id="answerInput" rows="4" placeholder="${q.placeholder}">${savedVal}</textarea>`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'slider') {
                        const currentVal = savedVal || q.default;
                        inputHtml = `
                            <div class="slider-value" id="sliderVal">${currentVal}</div>
                            <input type="range" id="answerInput" min="${q.min}" max="${q.max}" value="${currentVal}">
                        `;
                        isNextDisabled = false; 
                    } else if (q.type === 'words') {
                        const words = savedVal ? savedVal.split(", ") : ["", "", ""];
                        inputHtml = `
                            <div class="words-grid">
                                <input type="text" id="w1" placeholder="Слово 1" value="${words[0] || ''}">
                                <input type="text" id="w2" placeholder="Слово 2" value="${words[1] || ''}">
                                <input type="text" id="w3" placeholder="Слово 3" value="${words[2] || ''}">
                            </div>
                        `;
                        isNextDisabled = !(words[0] && words[1] && words[2]);
                    } else if (q.type === 'choice') {
                        tempChoice = savedVal;
                        inputHtml = `
                            <div class="choice-grid">
                                <button class="choice-btn ${tempChoice === 'Да' ? 'active' : ''}" data-val="Да">Да</button>
                                <button class="choice-btn ${tempChoice === 'Нет' ? 'active' : ''}" data-val="Нет">Нет</button>
                            </div>
                        `;
                        isNextDisabled = !tempChoice;
                    }

                    const btnText = (currentStep === questions.length - 1) ? "Отправить" : "Далее";

                    html = `
                        <div class="text-content">${q.text}</div>
                        ${inputHtml}
                        <div class="nav-buttons">
                            <button class="btn btn-back" id="backBtn">Назад</button>
                            <button class="btn" id="nextBtn" ${isNextDisabled ? 'disabled' : ''}>${btnText}</button>
                        </div>
                    `;
                } else {
                    // Финал
                    const finalText = "Всё, окей, я тебя услышал, в ближайшее время с тобой свяжутся в лс, спасибо что уделил время.";
                    html = `
                        <div class="text-content" style="margin-bottom: 0;">
                            ${generateAnimatedText(finalText)}
                        </div>
                    `;
                    console.log("Данные готовы к отправке:", userAnswers);
                }

                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');

                attachEventListeners(q);

            }, 300);
        }

        // Привязываем события через JS, чтобы избежать любых багов с onclick в HTML
        function attachEventListeners(q) {
            // Кнопка Старт
            const startBtn = document.getElementById('startBtn');
            if (startBtn) {
                startBtn.addEventListener('click', () => { currentStep++; renderStep(); });
            }

            // Кнопка Назад
            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.addEventListener('click', () => { currentStep--; renderStep(); });
            }

            // Кнопка Далее / Отправить
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    // Сохраняем ответ перед переходом
                    if (q.type === 'slider' || q.type === 'text' || q.type === 'textarea') {
                        userAnswers[q.id] = document.getElementById('answerInput').value.trim();
                    } else if (q.type === 'words') {
                        const w1 = document.getElementById('w1').value.trim();
                        const w2 = document.getElementById('w2').value.trim();
                        const w3 = document.getElementById('w3').value.trim();
                        userAnswers[q.id] = `${w1}, ${w2}, ${w3}`;
                    } else if (q.type === 'choice') {
                        userAnswers[q.id] = tempChoice;
                    }
                    currentStep++;
                    renderStep();
                });
            }

            // Логика проверки ввода (чтобы кнопка "Далее" становилась активной)
            if (q) {
                if (q.type === 'text' || q.type === 'textarea') {
                    const input = document.getElementById('answerInput');
                    input.addEventListener('input', () => {
                        nextBtn.disabled = input.value.trim().length === 0;
                    });
                } 
                else if (q.type === 'slider') {
                    const input = document.getElementById('answerInput');
                    const valDisplay = document.getElementById('sliderVal');
                    input.addEventListener('input', (e) => {
                        valDisplay.innerText = e.target.value;
                    });
                }
                else if (q.type === 'words') {
                    const w1 = document.getElementById('w1');
                    const w2 = document.getElementById('w2');
                    const w3 = document.getElementById('w3');
                    const checkWords = () => {
                        if(w1.value.includes(' ')) w1.value = w1.value.replace(/\s/g, '');
                        if(w2.value.includes(' ')) w2.value = w2.value.replace(/\s/g, '');
                        if(w3.value.includes(' ')) w3.value = w3.value.replace(/\s/g, '');
                        nextBtn.disabled = !(w1.value.trim() && w2.value.trim() && w3.value.trim());
                    };
                    w1.addEventListener('input', checkWords);
                    w2.addEventListener('input', checkWords);
                    w3.addEventListener('input', checkWords);
                }
                else if (q.type === 'choice') {
                    const btns = document.querySelectorAll('.choice-btn');
                    btns.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            btns.forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            tempChoice = e.target.getAttribute('data-val');
                            nextBtn.disabled = false;
                        });
                    });
                }
            }
        }

        renderStep();
    </script>
</body>
</html>
