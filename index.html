<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Анкета NAVERNO</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        /* Подключение твоих кастомных шрифтов */
        @font-face {
            font-family: 'MarkerFat';
            src: url('Marker Fat.otf') format('opentype');
        }
        @font-face {
            font-family: 'Lemon';
            src: url('ofont.ru_Lemon.ttf') format('truetype');
        }

        /* Общие стили и черный фон */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Центрируем всё по вертикали */
            overflow-x: hidden;
        }

        /* Логотип */
        .header {
            font-family: 'MarkerFat', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            z-index: 2;
        }

        /* Центральная плашка */
        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 30px;
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Подсветка плашки при наведении */
        .container:hover {
            border-color: #444444;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .text-content {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #eeeeee;
        }

        /* Поля ввода (Текст) */
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background: #111111;
            border: 1px solid #333333;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 1rem;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s ease, background 0.3s ease;
            resize: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #ffffff;
            background: #1a1a1a;
        }

        /* Три слова в ряд */
        .words-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .words-grid input {
            margin-bottom: 0;
            text-align: center;
        }

        /* Ползунки (Range) */
        .slider-value {
            font-size: 2rem;
            font-family: 'MarkerFat', sans-serif;
            margin-bottom: 10px;
            color: #ffffff;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #222222;
            height: 6px;
            border-radius: 5px;
            outline: none;
            margin-bottom: 30px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: transform 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Кнопки выбора Да/Нет */
        .choice-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .choice-btn {
            flex: 1;
            padding: 15px;
            background: #111111;
            border: 1px solid #333333;
            border-radius: 10px;
            color: #ffffff;
            font-family: 'Lemon', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .choice-btn:hover { background: #222222; }
        .choice-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            font-weight: bold;
        }

        /* Навигационные кнопки (Далее / Назад) */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 2;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 20px;
            font-family: 'Lemon', sans-serif;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover:not(:disabled) {
            background: #cccccc;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #333333;
            color: #666666;
            cursor: not-allowed;
        }

        .btn-back {
            flex: 1;
            background: transparent;
            color: #888888;
            border: 1px solid #333333;
        }
        
        .btn-back:hover {
            background: #222222;
            color: #ffffff;
            border-color: #666666;
        }

        /* Анимации */
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
    </style>
</head>
<body>

    <div class="header">NAVERNO</div>

    <div class="container" id="main-container">
        <!-- Контент -->
    </div>

    <script>
        vkBridge.send('VKWebAppInit');

        // Массив с вопросами (обновленные типы)
        const questions = [
            { id: "q1", text: "Как тебе наш контент по десяти балльной системе?", type: "slider", min: 1, max: 10, default: 10 },
            { id: "q2", text: "Хм, а с какого видео ты с нами познакомился и продолжил следить?", type: "text", placeholder: "Твой ответ..." },
            { id: "q3", text: "Ого, а почему вообще захотел стать частью нашей студии?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q4", text: "Спасибо! А теперь к вопросам касаемо твоей кандидатуры.<br><br>С какого года играешь на провинции?", type: "slider", min: 2016, max: 2026, default: 2020 },
            { id: "q5", text: "А какой лвл у тебя?", type: "slider", min: 1, max: 100, default: 10 },
            { id: "q6", text: "Как ты можешь охарактеризовать себя тремя словами?", type: "words" },
            { id: "q7", text: "Вероятно нам для съёмок понадобится взаимодействие с тобой в дискорде, не будет такого что ты будешь нас перебивать и так далее?", type: "textarea", placeholder: "Твой ответ..." },
            { id: "q8", text: "Эти слова про тебя? - могу предложить в идее что-то изменить, улучшить и при этом не постесняюсь", type: "choice" },
            { id: "q9", text: "В какие дни ты обычно свободен?", type: "text", placeholder: "Например: Пн, Ср, Пт" },
            { id: "q10", text: "И по времени хотелось бы понимать, какой диапазон (с какого времени до какого)", type: "text", placeholder: "Например: с 18:00 до 22:00" }
        ];

        let currentStep = -1;
        let userAnswers = {};
        let tempChoice = ""; // Для временного хранения выбора кнопки

        const container = document.getElementById('main-container');

        function renderStep() {
            container.classList.remove('fade-in');
            container.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                if (currentStep === -1) {
                    html = `
                        <div class="text-content">
                            Здарова! Мы тут решили набрать какое-то количество людей в актёрский состав, чтобы у нас было больше свободы фантазии, если ты хочешь двигаться с нами, то нам нужно о тебе немного узнать, для этого тебе нужно заполнить анкету.
                        </div>
                        <button class="btn" style="width: 100%;" onclick="nextStep()">Заполнить анкету</button>
                    `;
                } else if (currentStep < questions.length) {
                    const q = questions[currentStep];
                    let inputHtml = '';
                    let isNextDisabled = true;
                    
                    // Восстанавливаем прошлый ответ, если он есть
                    const savedVal = userAnswers[q.id] || "";

                    if (q.type === 'text') {
                        inputHtml = `<input type="text" id="answerInput" placeholder="${q.placeholder}" value="${savedVal}" oninput="checkInput()">`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'textarea') {
                        inputHtml = `<textarea id="answerInput" rows="3" placeholder="${q.placeholder}" oninput="checkInput()">${savedVal}</textarea>`;
                        isNextDisabled = !savedVal;
                    } else if (q.type === 'slider') {
                        const currentVal = savedVal || q.default;
                        inputHtml = `
                            <div class="slider-value" id="sliderVal">${currentVal}</div>
                            <input type="range" id="answerInput" min="${q.min}" max="${q.max}" value="${currentVal}" oninput="updateSlider(this.value)">
                        `;
                        isNextDisabled = false; // Ползунок всегда имеет значение
                    } else if (q.type === 'words') {
                        const words = savedVal ? savedVal.split(", ") : ["", "", ""];
                        inputHtml = `
                            <div class="words-grid">
                                <input type="text" id="w1" placeholder="Слово 1" value="${words[0] || ''}" oninput="checkWords()">
                                <input type="text" id="w2" placeholder="Слово 2" value="${words[1] || ''}" oninput="checkWords()">
                                <input type="text" id="w3" placeholder="Слово 3" value="${words[2] || ''}" oninput="checkWords()">
                            </div>
                        `;
                        isNextDisabled = !(words[0] && words[1] && words[2]);
                    } else if (q.type === 'choice') {
                        tempChoice = savedVal;
                        inputHtml = `
                            <div class="choice-grid">
                                <button class="choice-btn ${tempChoice === 'Да' ? 'active' : ''}" onclick="selectChoice('Да', this)">Да</button>
                                <button class="choice-btn ${tempChoice === 'Нет' ? 'active' : ''}" onclick="selectChoice('Нет', this)">Нет</button>
                            </div>
                        `;
                        isNextDisabled = !tempChoice;
                    }

                    const btnText = (currentStep === questions.length - 1) ? "Отправить" : "Далее";

                    html = `
                        <div class="text-content">${q.text}</div>
                        ${inputHtml}
                        <div class="nav-buttons">
                            <button class="btn btn-back" onclick="prevStep()">Назад</button>
                            <button class="btn" id="nextBtn" onclick="saveAnswerAndNext()" ${isNextDisabled ? 'disabled' : ''}>${btnText}</button>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="text-content" style="margin-bottom: 0;">
                            Всё, окей, я тебя услышал, в ближайшее время с тобой свяжутся в лс, спасибо что уделил время.
                        </div>
                    `;
                    console.log("Данные для бота:", userAnswers);
                }

                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
            }, 300);
        }

        // Обновление цифры над ползунком
        function updateSlider(val) {
            document.getElementById('sliderVal').innerText = val;
            document.getElementById('nextBtn').disabled = false;
        }

        // Проверка для обычного текста
        function checkInput() {
            const val = document.getElementById('answerInput').value.trim();
            document.getElementById('nextBtn').disabled = val.length === 0;
        }

        // Проверка для трех слов (не разрешаем пробелы, чтобы было ровно одно слово)
        function checkWords() {
            const w1 = document.getElementById('w1').value.trim();
            const w2 = document.getElementById('w2').value.trim();
            const w3 = document.getElementById('w3').value.trim();
            
            // Если в поле ввели пробел, стираем его (чтобы было только 1 слово)
            if(w1.includes(' ')) document.getElementById('w1').value = w1.replace(/\s/g, '');
            if(w2.includes(' ')) document.getElementById('w2').value = w2.replace(/\s/g, '');
            if(w3.includes(' ')) document.getElementById('w3').value = w3.replace(/\s/g, '');

            document.getElementById('nextBtn').disabled = !(w1 && w2 && w3);
        }

        // Выбор кнопки Да/Нет
        function selectChoice(val, btnElement) {
            tempChoice = val;
            
            // Убираем подсветку со всех кнопок
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Добавляем подсветку на нажатую
            btnElement.classList.add('active');
            document.getElementById('nextBtn').disabled = false;
        }

        function saveAnswerAndNext() {
            const q = questions[currentStep];
            
            if (q.type === 'slider' || q.type === 'text' || q.type === 'textarea') {
                userAnswers[q.id] = document.getElementById('answerInput').value.trim();
            } else if (q.type === 'words') {
                const w1 = document.getElementById('w1').value.trim();
                const w2 = document.getElementById('w2').value.trim();
                const w3 = document.getElementById('w3').value.trim();
                userAnswers[q.id] = `${w1}, ${w2}, ${w3}`;
            } else if (q.type === 'choice') {
                userAnswers[q.id] = tempChoice;
            }

            currentStep++;
            renderStep();
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                renderStep();
            } else {
                currentStep = -1; // Вернуться на стартовый экран
                renderStep();
            }
        }

        renderStep();
    </script>
</body>
</html>
